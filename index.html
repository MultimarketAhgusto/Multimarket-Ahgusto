<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimarket Ahgusto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-width: 250px; }
        body { font-family: 'Poppins', sans-serif; margin: 0; display: flex; background-color: #fdfaf5; color: #333; }

        /* Barra Lateral */
        nav { width: var(--sidebar-width); height: 100vh; background: white; border-right: 1px solid #eee; position: fixed; padding: 20px 0; z-index: 10; }
        .logo-nav { width: 80px; margin: 0 auto 30px; display: block; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav ul li { padding: 15px 30px; font-size: 0.9rem; font-weight: 600; color: #333; text-transform: uppercase; cursor: pointer; }
        nav ul li.active { background: #f9f1e4; border-right: 4px solid #d4a373; }

        /* Contenido Principal */
        .container { margin-left: var(--sidebar-width); width: 100%; padding: 40px; }

        /* Banner de Rayas y Logo Ah Gusto */
        .hero-banner { 
            background: repeating-linear-gradient(90deg, #00468b, #00468b 20px, #ffffff 20px, #ffffff 40px); 
            padding: 40px; display: flex; justify-content: center; margin-bottom: 40px; 
        }
        .logo-circulo { 
            background: #f1c40f; padding: 20px; border-radius: 50%; border: 4px solid #d35400; 
            text-align: center; width: 180px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }

        /* Buscador */
        .search-box { width: 100%; max-width: 600px; padding: 15px; margin: 0 auto 40px; display: block; border-radius: 10px; border: 1px solid #ddd; }

        /* Estilo de Secciones por Categoría */
        .categoria-titulo { 
            background: #00468b; color: white; padding: 10px 20px; border-radius: 8px; 
            margin: 40px 0 20px; text-transform: uppercase; letter-spacing: 1px;
        }

        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }

        .card { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card h3 { font-size: 1rem; height: 45px; overflow: hidden; margin: 10px 0; }
        .card .precio { font-size: 1.3rem; font-weight: 700; color: #27ae60; margin-bottom: 15px; }
        .btn-ver { background: #a8dadc; color: #1d3557; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <img src="logo.png" class="logo-nav" onerror="this.src='https://via.placeholder.com/80?text=AhGusto'">
        <ul>
            <li class="active">Inicio</li>
            <li>Productos</li>
            <li>Ofertas</li>
            <li>Contacto</li>
        </ul>
    </nav>

    <div class="container">
        <div class="hero-banner">
            <div class="logo-circulo">
                <h2 style="margin:0; color:#d35400; font-size: 1.2rem;">Ah Gusto</h2>
                <small style="color:#333; font-weight:bold;">MULTIMARKET</small>
            </div>
        </div>

        <input type="text" id="buscador" class="search-box" placeholder="¿Qué buscas en Ahgusto hoy?">

        <div id="secciones-productos">
            </div>
    </div>

    <script>
        let inventario = [];

        async function cargar() {
            try {
                const res = await fetch('datosproductos.json');
                inventario = await res.json();
                render(inventario);
            } catch (e) { console.error("Error cargando datos", e); }
        }

        function render(datos) {
            const mainContainer = document.getElementById('secciones-productos');
            mainContainer.innerHTML = '';

            // 1. Agrupar productos por la columna "Categoría" que viene de tu Excel
            const categorias = {};
            datos.forEach(p => {
                const catNombre = p.Categoría || p.CATEGORIA || p.categoria || "Otros";
                if (!categorias[catNombre]) categorias[catNombre] = [];
                categorias[catNombre].push(p);
            });

            // 2. Crear una sección visual por cada categoría encontrada
            for (const cat in categorias) {
                const seccion = document.createElement('div');
                seccion.innerHTML = `<h2 class="categoria-titulo">${cat}</h2>`;
                
                const grid = document.createElement('div');
                grid.className = 'grid-productos';

                categorias[cat].forEach(p => {
                    // CORRECCIÓN PRECIO: Busca exactamente "P.Venta" como en tu imagen de Excel
                    const nombre = p.NOMBRE || p.Nombre || "Producto";
                    const precioStr = p["P.Venta"] || p.P_Venta || p.PVenta || p.precio || "0";
                    
                    // Limpiar el precio por si tiene "S/" o espacios
                    const precioLimpio = precioStr.toString().replace('S/', '').replace(',', '').trim();
                    const precioFinal = parseFloat(precioLimpio) || 0;

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <small style="color:#aaa">COD: ${p.Código || p.CODIGO || '---'}</small>
                        <h3>${nombre}</h3>
                        <div class="precio">S/ ${precioFinal.toFixed(2)}</div>
                        <button class="btn-ver">VER MÁS</button>
                    `;
                    grid.appendChild(card);
                });

                seccion.appendChild(grid);
                mainContainer.appendChild(seccion);
            }
        }

        // Buscador
        document.getElementById('buscador').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtrados = inventario.filter(p => 
                (p.NOMBRE || p.nombre || "").toLowerCase().includes(term)
            );
            render(filtrados);
        });

        cargar();
    </script>
</body>
</html>
