<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimarket Ahgusto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 220px;
            /* Tu fondo de rayas azules y blancas original */
            --bg-stripes: repeating-linear-gradient(
                90deg,
                #00468b,
                #00468b 30px,
                #ffffff 30px,
                #ffffff 60px
            );
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            background-color: #fdfaf5;
            color: #333;
        }

        /* Barra Lateral Izquierda */
        nav {
            width: var(--sidebar-width);
            height: 100vh;
            background: white;
            border-right: 1px solid #ddd;
            position: fixed;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .logo-nav {
            width: 60px;
            margin: 0 auto 30px;
            display: block;
            border-radius: 50%;
            background: #00468b;
        }

        nav ul { list-style: none; padding: 0; margin: 0; }
        nav ul li {
            padding: 15px 25px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #444;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Contenido Principal con el fondo de rayas */
        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            min-height: 100vh;
            background: var(--bg-stripes);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-box {
            background: #00468b;
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Buscador */
        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-size: 1rem;
        }

        /* Grid de Tarjetas */
        .grid-productos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* Diseño de la Tarjeta */
        .card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); }

        .card .codigo { font-size: 0.65rem; color: #888; margin-bottom: 5px; }
        .card .nombre { 
            font-size: 0.9rem; 
            font-weight: 700; 
            color: #00468b; 
            margin-bottom: 10px;
            height: 40px;
            overflow: hidden;
        }
        .card .precio { font-size: 1.2rem; font-weight: bold; color: #27ae60; margin-bottom: 10px; }

        .btn-add {
            background: #00468b;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-nav" style="height: 60px;"></div>
        <ul>
            <li>Inicio</li>
            <li>Productos</li>
            <li>Carrito</li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="header-box">
            <h1 style="margin:0;">Multimarket Ahgusto</h1>
            <p style="margin:5px 0 0;">Tu ahorro empieza aquí</p>
        </div>

        <input type="text" id="buscador" class="search-bar" placeholder="Buscar producto...">

        <div class="grid-productos" id="contenedor">
            </div>
    </div>

    <script>
        let inventario = [];

        async function cargarDatos() {
            try {
                const res = await fetch('datosproductos.json');
                inventario = await res.json();
                renderizar(inventario);
            } catch (e) {
                console.error("Error cargando JSON", e);
            }
        }

        function renderizar(lista) {
            const container = document.getElementById('contenedor');
            container.innerHTML = '';

            lista.forEach(p => {
                // Esto soluciona el error de "0.00" y "Sin nombre":
                // Busca tanto en minúsculas como en MAYÚSCULAS según tu Excel
                const nombre = p.nombre || p.NOMBRE || "Sin Nombre";
                const codigo = p.codigo || p.Código || p.CODIGO || "S/N";
                const precio = p.precio || p.P_Venta || p.P_VENTA || p.precio_venta || 0;

                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="codigo">REF: ${codigo}</div>
                    <div class="nombre">${nombre}</div>
                    <div class="precio">S/ ${parseFloat(precio).toFixed(2)}</div>
                    <button class="btn-add">Agregar al carrito</button>
                `;
                container.appendChild(div);
            });
        }

        // Buscador
        document.getElementById('buscador').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtrados = inventario.filter(p => 
                (p.nombre || p.NOMBRE || "").toLowerCase().includes(term)
            );
            renderizar(filtrados);
        });

        cargarDatos();
    </script>
</body>
</html>
