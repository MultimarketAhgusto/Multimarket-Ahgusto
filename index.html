<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimarket Ahgusto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 240px;
            --blue-ahgusto: #00468b;
            /* Fondo de rayas azules y blancas */
            --bg-stripes: repeating-linear-gradient(
                90deg,
                #00468b,
                #00468b 40px,
                #ffffff 40px,
                #ffffff 80px
            );
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            background-color: #f4f7f6;
            color: #333;
        }

        /* BARRA LATERAL */
        nav {
            width: var(--sidebar-width);
            height: 100vh;
            background: white;
            border-right: 1px solid #ddd;
            position: fixed;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .logo-nav {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: var(--blue-ahgusto);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav ul li {
            padding: 15px 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: #555;
        }

        nav ul li:hover {
            background: #f0f7ff;
            color: var(--blue-ahgusto);
            padding-left: 40px;
        }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            min-height: 100vh;
            background: var(--bg-stripes);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-ahgusto {
            text-align: center;
            color: white;
            background: rgba(0, 70, 139, 0.9);
            padding: 20px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            width: 100%;
            max-width: 800px;
        }

        /* BUSCADOR */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
        }

        #buscador {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            font-size: 1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            outline: none;
        }

        /* GRID DE PRODUCTOS */
        .grid-productos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        /* TARJETAS */
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #eee;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .card .codigo {
            font-size: 0.7rem;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .card .nombre {
            font-size: 0.95rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }

        .card .precio {
            font-size: 1.4rem;
            font-weight: 800;
            color: #27ae60;
            margin-bottom: 15px;
        }

        .btn-comprar {
            background: var(--blue-ahgusto);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-comprar:hover {
            background: #e67e22; /* Color naranja al pasar el mouse para resaltar */
        }

        /* Mensaje de no resultados */
        #sin-resultados {
            color: white;
            display: none;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-nav">MA</div>
        <h2 style="text-align:center; font-size: 1rem; color: #00468b;">Ahgusto</h2>
        <ul>
            <li>🏠 Inicio</li>
            <li>📦 Productos</li>
            <li>🔥 Ofertas</li>
            <li>🛒 Mi Carrito</li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="header-ahgusto">
            <h1 style="margin:0;">Multimarket Ahgusto</h1>
            <p style="margin:5px 0 0;">Tu ahorro empieza aquí</p>
        </div>

        <div class="search-container">
            <input type="text" id="buscador" placeholder="🔍 Buscar producto por nombre...">
        </div>

        <div id="sin-resultados">No encontramos productos con ese nombre.</div>

        <div class="grid-productos" id="contenedor-productos">
            </div>
    </div>

    <script>
        let todosLosProductos = [];

        async function cargarInventario() {
            try {
                // Asegúrate que el archivo se llame exactamente datosproductos.json en GitHub
                const res = await fetch('datosproductos.json');
                todosLosProductos = await res.json();
                mostrarProductos(todosLosProductos);
            } catch (error) {
                console.error("Error cargando JSON:", error);
                document.getElementById('contenedor-productos').innerHTML = 
                    "<p style='color:white;'>Error al cargar el inventario. Revisa el archivo JSON.</p>";
            }
        }

        function mostrarProductos(lista) {
            const contenedor = document.getElementById('contenedor-productos');
            const mensajeSinResultados = document.getElementById('sin-resultados');
            contenedor.innerHTML = "";

            if (lista.length === 0) {
                mensajeSinResultados.style.display = "block";
            } else {
                mensajeSinResultados.style.display = "none";
                lista.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // Ajuste de nombres de campos según tu JSON
                    // Si en tu JSON es "NOMBRE" en mayúsculas, cámbialo aquí a p.NOMBRE
                    const nombre = p.nombre || p.NOMBRE || "Producto sin nombre";
                    const codigo = p.codigo || p.CODIGO || "S/C";
                    const precio = p.precio || p.PRECIO || 0;

                    card.innerHTML = `
                        <div class="codigo">REF: ${codigo}</div>
                        <div class="nombre">${nombre}</div>
                        <div class="precio">S/ ${parseFloat(precio).toFixed(2)}</div>
                        <button class="btn-comprar">Agregar al carrito</button>
                    `;
                    contenedor.appendChild(card);
                });
            }
        }

        // Lógica del buscador en tiempo real
        document.getElementById('buscador').addEventListener('input', (e) => {
            const texto = e.target.value.toLowerCase();
            const filtrados = todosLosProductos.filter(p => {
                const nombreP = (p.nombre || p.NOMBRE || "").toLowerCase();
                return nombreP.includes(texto);
            });
            mostrarProductos(filtrados);
        });

        // Iniciar carga
        cargarInventario();
    </script>

</body>
</html>
