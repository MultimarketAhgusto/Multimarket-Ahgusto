<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimarket Ahgusto - Terminal de Ventas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-width: 260px; --primary: #1a3c5a; --accent: #d4a373; }
        body { font-family: 'Poppins', sans-serif; margin: 0; display: flex; background-color: #fdfaf5; color: #333; overflow-x: hidden; }

        /* Sidebar */
        nav { width: var(--sidebar-width); height: 100vh; background: white; border-right: 1px solid #eee; position: fixed; padding: 20px 0; z-index: 10; overflow-y: auto; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav ul li { padding: 12px 30px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        nav ul li:hover, nav ul li.active { background: #fff8ef; border-left: 4px solid var(--accent); color: var(--accent); }

        /* Contenedor Principal */
        .container { margin-left: var(--sidebar-width); width: 100%; padding: 20px 40px; box-sizing: border-box; }

        /* Buscador / Escáner */
        .search-container { background: white; padding: 15px; border-radius: 12px; margin-bottom: 30px; display: flex; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #barcode-input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; outline: none; transition: 0.3s; }
        #barcode-input:focus { border-color: var(--primary); }

        /* Grid de Productos */
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; border: 1px solid transparent; }
        .card:hover { border-color: var(--accent); }
        
        .precio-tag { background: var(--primary); color: white; padding: 4px 12px; border-radius: 5px; font-weight: 700; font-size: 0.9rem; margin-bottom: 10px; }
        
        /* Imagen con Icono de Respaldo */
        .img-box { width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; background: #fdfdfd; border-radius: 10px; margin: 10px 0; position: relative; }
        .img-producto { max-width: 100%; max-height: 100%; object-fit: contain; z-index: 2; }
        .icon-fallback { position: absolute; width: 60px; opacity: 0.2; z-index: 1; }

        .stock-tag { padding: 3px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; margin-bottom: 8px; }
        .con-stock { background: #e8f5e9; color: #2e7d32; }
        .sin-stock { background: #ffebee; color: #c62828; }

        h3 { font-size: 0.75rem; color: #555; height: 35px; overflow: hidden; margin: 10px 0; line-height: 1.2; }
        .btn-accion { background: #e0f2f1; color: #00796b; border: none; padding: 8px; border-radius: 6px; font-weight: 700; font-size: 0.7rem; cursor: pointer; width: 100%; }

        /* Mensaje Flotante Escáner */
        .scan-msg { font-size: 0.8rem; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <nav>
        <div style="text-align: center; margin-bottom: 20px;">
            <strong style="color: var(--primary);">AHGUSTO POS</strong>
        </div>
        <ul id="menu-categorias">
            <li class="active" onclick="location.reload()">🔄 Actualizar</li>
        </ul>
    </nav>

    <div class="container">
        <div class="search-container">
            <div style="flex-grow: 1;">
                <input type="text" id="barcode-input" placeholder="Escanea un código de barras o busca por nombre..." autocomplete="off">
                <div class="scan-msg">💡 Listo para escanear...</div>
            </div>
        </div>

        <div id="contenedor-tienda">
            </div>
    </div>

    <script>
        let inventario = [];
        const inputBusqueda = document.getElementById('barcode-input');

        async function cargarDatos() {
            try {
                const res = await fetch('datosproductos.json');
                inventario = await res.json();
                renderizarTienda(inventario);
            } catch (e) { console.error("Error cargando JSON", e); }
        }

        function renderizarTienda(datos) {
            const tienda = document.getElementById('contenedor-tienda');
            const menu = document.getElementById('menu-categorias');
            tienda.innerHTML = "";
            
            const grupos = {};
            datos.forEach(p => {
                const c = p.Categoría || p.CATEGORIA || "Varios";
                if (!grupos[c]) grupos[c] = [];
                grupos[c].push(p);
            });

            for (const cat in grupos) {
                // Agregar al menú si es la carga inicial
                if (menu.children.length < 5) {
                    const li = document.createElement('li');
                    li.textContent = cat;
                    li.onclick = () => filtrarCategoria(cat);
                    menu.appendChild(li);
                }

                const seccion = document.createElement('div');
                seccion.className = 'categoria-bloque';
                seccion.id = `cat-${cat.replace(/\s/g, '')}`;
                seccion.innerHTML = `<h2 style="font-size: 1.1rem; border-bottom: 2px solid #eee; padding-bottom: 10px;">${cat}</h2>`;
                
                const grid = document.createElement('div');
                grid.className = 'grid-productos';

                grupos[cat].forEach(p => {
                    const nombre = p.NOMBRE || p.Nombre || "Producto sin nombre";
                    const precio = p["P.Venta"] || p.P_Venta || "0.00";
                    const stock = parseInt(p.Stock) || 0;
                    const cod = p.Código || p.CODIGO || "";
                    
                    // Lógica de Imagen: Si el código es largo (EAN13), buscamos en OpenFoodFacts. 
                    // Si falla o no hay, muestra el icono de carrito que tienes en tu diseño.
                    let imgFinal = `https://world.openfoodfacts.org/images/products/${cod}/front_es.400.jpg`;
                    const iconoRespaldo = "https://cdn-icons-png.flaticon.com/512/3081/3081840.png";

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.dataset.codigo = cod; // Guardamos el código para el escáner
                    card.innerHTML = `
                        <div class="precio-tag">S/ ${precio}</div>
                        <div class="img-box">
                            <img src="${iconoRespaldo}" class="icon-fallback">
                            <img src="${imgFinal}" class="img-producto" onerror="this.style.display='none'">
                        </div>
                        <div class="stock-tag ${stock > 0 ? 'con-stock' : 'sin-stock'}">
                            ${stock > 0 ? 'Stock: '+stock : 'Sin Stock'}
                        </div>
                        <h3>${nombre}</h3>
                        <button class="btn-accion">VER DETALLES</button>
                    `;
                    grid.appendChild(card);
                });
                seccion.appendChild(grid);
                tienda.appendChild(seccion);
            }
        }

        // LÓGICA DEL ESCÁNER Y BÚSQUEDA
        inputBusqueda.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            
            cards.forEach(card => {
                const nombre = card.querySelector('h3').innerText.toLowerCase();
                const codigo = card.dataset.codigo.toString();
                
                // Si el escáner detecta el código exacto o el nombre coincide
                if (nombre.includes(term) || codigo === term) {
                    card.style.display = "flex";
                    if (codigo === term) {
                        card.style.borderColor = "var(--accent)";
                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    card.style.display = "none";
                }
            });

            // Si se borra la búsqueda, mostrar todos
            if (term === "") {
                cards.forEach(c => c.style.display = "flex");
            }
        });

        // Auto-foco en el buscador para que el escáner siempre funcione
        window.addEventListener('keydown', () => {
            if (document.activeElement !== inputBusqueda) {
                inputBusqueda.focus();
            }
        });

        cargarDatos();
    </script>
</body>
</html>
